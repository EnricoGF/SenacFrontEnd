<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Inscreva-se</title>
</head>

<body>
    <h1>Inscreva sua equipe</h1>
    <form action="sucesso.html" method="get">
        <p>
            Nome da equipe: <input type="text" name="nome" size="30">
        </p>
        <p>
            Participantes: <input type="number" name="participantes" size="30">
        </p>

        <p>Esporte: 
            <select name="esporte">
                <option value="futebol" checked>Futebol</option>
                <option value="basquete">Basquete</option>
                <option value="volei">Vôlei</option>
            </select>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Cancelar">
        </p>
        
    </form>
</body>

</html>
